services:
  web:
    image: php:8.5-apache
    container_name: dashboardHome
    user: "${UID}:${GID}"
    ports:
      - "80:80"
    volumes:
      - ./main/php:/var/www/html
    restart: unless-stopped
    depends_on:
      - vite
  vite:
    image: node:26-alpine
    working_dir: /app
    user: "${UID}:${GID}"
    restart: unless-stopped
    volumes:
      - ./main/vite:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"